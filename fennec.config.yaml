# Fennec Configuration
# Generated by 'fennec init'

browser:
  type: chromium
  headless: true
  defaultTimeout: 30000
  viewport:
    width: 1280
    height: 720

session:
  maxSessions: 10
  idleTimeoutSecs: 1800
  persistPath: '.fennec/sessions'

process:
  maxProcesses: 10
  logBufferLines: 2000
  spawnAllowlist:
    - 'npm'
    - 'node'
    - 'pnpm'
    - 'yarn'
    - 'bun'
    - 'python'
    - 'python3'

terminal:
  logBufferLines: 2000
  watchDebounceMs: 50

network:
  bufferSize: 1000
  captureRequestBody: true
  captureResponseBody: true
  slowRequestThresholdMs: 1000

console:
  bufferSize: 500
  levels:
    - log
    - info
    - warn
    - error
    - debug

correlation:
  windowMs: 500
  enableRootCauseInference: true
  minConfidence: 0.7

security:
  sandbox: true
  allowProcessSpawn: true
  allowProcessKill: false
  allowedDomains: []
  blockedDomains: []
  allowFileProtocol: false
  allowCDPRawAccess: false
  exportPath: '.fennec/exports'
  maxExportSizeMB: 10

transport:
  type: stdio
  port: 3333
  host: '127.0.0.1'

logging:
  level: info
  format: pretty
  file: null
