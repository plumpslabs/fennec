name: Publish

on:
  release:
    types: [published]

jobs:
  # ─── Publish to npmjs.com ───
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Publish @plumpslabs/fennec-core
        run: |
          cd packages/core
          pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @plumpslabs/fennec-cli
        run: |
          cd packages/cli
          pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Publish to GitHub Packages ───
  publish-gpr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Configure GPR scoped registry for pnpm
        run: |
          # pnpm config writes to ~/.npmrc (same file as setup-node), so pnpm reads it
          pnpm config set @plumpslabs:registry "https://npm.pkg.github.com"
        # Auth token is already configured by actions/setup-node@v4 with registry-url + NODE_AUTH_TOKEN

      - name: Publish @plumpslabs/fennec-core
        run: |
          cd packages/core
          pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @plumpslabs/fennec-cli
        run: |
          cd packages/cli
          pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
